<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Empty feed — no posts yet">
  <rect width="600" height="360" rx="16" fill="#F9FAFB"/>

  <!-- Stacked ghost post cards -->
  <rect x="130" y="50"  width="340" height="80" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5" opacity="0.5"/>
  <rect x="110" y="68"  width="380" height="80" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5" opacity="0.3"/>
  <rect x="150" y="32"  width="300" height="80" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5" opacity="0.7"/>

  <!-- Centered icon: document with pen, using brand purple -->
  <g transform="translate(270 100)">
    <!-- Document body -->
    <rect x="0" y="0" width="60" height="72" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
    <!-- Lines on document -->
    <rect x="10" y="18" width="40" height="5" rx="2.5" fill="#7C3AED" opacity="0.4"/>
    <rect x="10" y="30" width="32" height="5" rx="2.5" fill="#7C3AED" opacity="0.4"/>
    <rect x="10" y="42" width="36" height="5" rx="2.5" fill="#7C3AED" opacity="0.4"/>
    <!-- Pen badge -->
    <circle cx="52" cy="60" r="14" fill="#7C3AED"/>
    <line x1="46" y1="66" x2="58" y2="54" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="68" x2="47" y2="65" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Heading -->
  <text x="300" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">Nothing here yet</text>
  <!-- Sub-text -->
  <text x="300" y="236" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#6B7280">Be the first to post. Your thoughts live on-chain.</text>

  <!-- CTA button -->
  <rect x="218" y="260" width="164" height="44" rx="10" fill="#7C3AED"/>
  <text x="300" y="287" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Create a Post</text>

  <!-- Mobile hint (smaller) -->
  <text x="300" y="330" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#9CA3AF">Follow more people to populate your feed</text>
</svg>
