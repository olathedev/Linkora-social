<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Profile — no followers yet">
  <rect width="600" height="300" rx="16" fill="#F9FAFB"/>

  <!-- Ghost user icons arranged in a loose cluster -->
  <g transform="translate(226 40)" opacity="0.18">
    <circle cx="20"  cy="20" r="18" fill="#7C3AED"/>
    <circle cx="20"  cy="52" r="22" fill="#7C3AED"/>
    <circle cx="74"  cy="20" r="18" fill="#06B6D4"/>
    <circle cx="74"  cy="52" r="22" fill="#06B6D4"/>
    <circle cx="148" cy="20" r="18" fill="#7C3AED"/>
    <circle cx="148" cy="52" r="22" fill="#7C3AED"/>
  </g>

  <!-- Central person + plus icon -->
  <g transform="translate(262 44)">
    <circle cx="38" cy="26" r="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
    <!-- Head -->
    <circle cx="38" cy="22" r="10" fill="#7C3AED" opacity="0.6"/>
    <!-- Shoulders -->
    <path d="M16 50 Q38 38 60 50" fill="#7C3AED" opacity="0.6"/>
    <!-- Plus badge -->
    <circle cx="64" cy="8" r="12" fill="#06B6D4"/>
    <line x1="64" y1="3" x2="64" y2="13" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="59" y1="8" x2="69" y2="8"  stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <text x="300" y="168" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#111827">No followers yet</text>
  <text x="300" y="192" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#6B7280">Share your profile to start building your community.</text>

  <rect x="186" y="218" width="228" height="44" rx="10" fill="#06B6D4"/>
  <text x="300" y="245" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Share Profile</text>

  <text x="300" y="284" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#9CA3AF">CTA hidden on other people's profiles</text>
</svg>
