<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Profile — no posts yet">
  <rect width="600" height="300" rx="16" fill="#F9FAFB"/>

  <!-- Icon: empty inbox / box -->
  <g transform="translate(252 48)">
    <!-- Box body -->
    <rect x="0" y="20" width="96" height="68" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
    <!-- Box lid left flap -->
    <path d="M0 20 L48 44 L48 20 Z" fill="#7C3AED" opacity="0.25"/>
    <!-- Box lid right flap -->
    <path d="M96 20 L48 44 L48 20 Z" fill="#7C3AED" opacity="0.15"/>
    <!-- Box top edge -->
    <path d="M0 20 L48 44 L96 20" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linejoin="round"/>
    <!-- Star inside box -->
    <text x="48" y="72" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#7C3AED" opacity="0.5">✦</text>
  </g>

  <text x="300" y="170" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#111827">No posts yet</text>
  <text x="300" y="194" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#6B7280">This profile hasn't published anything on-chain.</text>

  <!-- CTA: own profile -->
  <rect x="186" y="220" width="228" height="44" rx="10" fill="#7C3AED"/>
  <text x="300" y="247" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Write your first post</text>

  <text x="300" y="284" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#9CA3AF">Shown on other profiles without the CTA button</text>
</svg>
