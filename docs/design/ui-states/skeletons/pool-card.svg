<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" role="img" aria-label="Pool card loading skeleton">
  <defs>
    <linearGradient id="shimmer-pool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E5E7EB"/>
      <stop offset="50%"  stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-600 0" to="600 0" dur="1.4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="600" height="120" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Pool icon -->
  <rect x="16" y="16" width="48" height="48" rx="10" fill="url(#shimmer-pool)"/>

  <!-- Pool name -->
  <rect x="80" y="20" width="160" height="14" rx="7" fill="url(#shimmer-pool)"/>
  <!-- Pool token / ID -->
  <rect x="80" y="42" width="100" height="10" rx="5" fill="url(#shimmer-pool)"/>

  <!-- Balance label -->
  <rect x="80" y="64" width="60" height="10" rx="5" fill="url(#shimmer-pool)"/>
  <!-- Balance value -->
  <rect x="80" y="80" width="90" height="14" rx="7" fill="url(#shimmer-pool)"/>

  <!-- Deposit / Withdraw buttons (right side) -->
  <rect x="440" y="36" width="64" height="32" rx="8" fill="url(#shimmer-pool)"/>
  <rect x="516" y="36" width="68" height="32" rx="8" fill="url(#shimmer-pool)"/>

  <!-- Admins badge -->
  <rect x="16" y="90" width="100" height="14" rx="7" fill="url(#shimmer-pool)"/>
</svg>
