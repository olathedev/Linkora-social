<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" role="img" aria-label="404 — Profile not found">
  <rect width="600" height="340" rx="16" fill="#F9FAFB"/>

  <!-- Ghost avatar (unknown user) -->
  <g transform="translate(252 32)">
    <!-- Avatar circle with dashed border -->
    <circle cx="48" cy="48" r="44" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 3"/>
    <!-- Ghost face -->
    <circle cx="36" cy="42" r="5" fill="#EF4444" opacity="0.5"/>
    <circle cx="60" cy="42" r="5" fill="#EF4444" opacity="0.5"/>
    <path d="M36 58 Q48 68 60 58" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Question mark -->
    <text x="48" y="54" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="700" fill="#EF4444" opacity="0.35">?</text>
  </g>

  <!-- 404 badge -->
  <rect x="254" y="136" width="92" height="32" rx="8" fill="#FEE2E2"/>
  <text x="300" y="157" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#EF4444">404</text>

  <text x="300" y="196" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700" fill="#111827">Profile not found</text>
  <text x="300" y="220" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#6B7280">No on-chain profile is registered to this address</text>
  <text x="300" y="238" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#6B7280">or username. They may not have joined yet.</text>

  <rect x="178" y="262" width="244" height="44" rx="10" fill="#7C3AED"/>
  <text x="300" y="289" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Go to Home Feed</text>
</svg>
